<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <!-- Background -->
  <rect width="1000" height="800" fill="#f8fafc" rx="8"/>
  
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1000" height="800" fill="url(#grid)"/>
  
  <!-- Outer Walls -->
  <rect x="50" y="50" width="900" height="700" fill="none" stroke="#1e293b" stroke-width="8" rx="4"/>
  
  <!-- Main Door (right wall) -->
  <rect x="940" y="350" width="12" height="120" fill="#f8fafc"/>
  <line x1="948" y1="350" x2="948" y2="340" stroke="#1e293b" stroke-width="4"/>
  <line x1="948" y1="470" x2="948" y2="480" stroke="#1e293b" stroke-width="4"/>
  <text x="960" y="415" font-size="14" fill="#64748b" font-family="sans-serif" transform="rotate(90,960,415)">CỬA</text>
  
  <!-- Windows (left wall) -->
  <rect x="42" y="150" width="16" height="120" fill="#93c5fd" rx="2"/>
  <rect x="42" y="400" width="16" height="120" fill="#93c5fd" rx="2"/>
  
  <!-- Windows (top wall) -->
  <rect x="200" y="42" width="120" height="16" fill="#93c5fd" rx="2"/>
  <rect x="500" y="42" width="120" height="16" fill="#93c5fd" rx="2"/>
  
  <!-- Kitchen (top left) -->
  <rect x="70" y="70" width="200" height="180" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" rx="4"/>
  <text x="170" y="155" text-anchor="middle" font-size="18" fill="#dc2626" font-weight="bold" font-family="sans-serif">BẾP</text>
  
  <!-- Bar counter (bottom right) -->
  <rect x="650" y="600" width="250" height="70" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" rx="8"/>
  <text x="775" y="642" text-anchor="middle" font-size="14" fill="#2563eb" font-weight="bold" font-family="sans-serif">QUẦY BAR</text>
  
  <!-- Cashier (near door) -->
  <rect x="800" y="300" width="120" height="80" fill="#fefce8" stroke="#fbbf24" stroke-width="2" rx="4"/>
  <text x="860" y="345" text-anchor="middle" font-size="12" fill="#a16207" font-weight="bold" font-family="sans-serif">THU NGÂN</text>
  
  <!-- Toilet (bottom left) -->
  <rect x="70" y="600" width="120" height="100" fill="#f0fdf4" stroke="#86efac" stroke-width="2" rx="4"/>
  <text x="130" y="655" text-anchor="middle" font-size="14" fill="#16a34a" font-weight="bold" font-family="sans-serif">WC</text>
  <path d="M 190 600 A 30 30 0 0 1 190 630" fill="none" stroke="#16a34a" stroke-width="2"/>
  
  <!-- Divider wall -->
  <line x1="400" y1="250" x2="400" y2="740" stroke="#1e293b" stroke-width="4"/>
  <rect x="388" y="350" width="24" height="80" fill="#f8fafc"/>
  <path d="M 388 350 A 40 40 0 0 1 412 350" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  
  <!-- Zone labels -->
  <text x="220" y="35" text-anchor="middle" font-size="13" fill="#64748b" font-family="sans-serif">PHÒNG VIP</text>
  <text x="650" y="35" text-anchor="middle" font-size="13" fill="#64748b" font-family="sans-serif">KHU VỰC CHÍNH</text>
</svg>
