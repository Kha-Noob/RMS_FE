<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8fafc" rx="8"/>
  
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#grid)"/>
  
  <!-- Outer Walls -->
  <rect x="50" y="50" width="1100" height="800" fill="none" stroke="#1e293b" stroke-width="8" rx="4"/>
  
  <!-- Main Door (bottom center) -->
  <rect x="500" y="840" width="200" height="12" fill="#f8fafc"/>
  <line x1="500" y1="850" x2="500" y2="840" stroke="#1e293b" stroke-width="4"/>
  <line x1="700" y1="850" x2="700" y2="840" stroke="#1e293b" stroke-width="4"/>
  <text x="600" y="875" text-anchor="middle" font-size="14" fill="#64748b" font-family="sans-serif">CỬA CHÍNH</text>
  
  <!-- Back Door (left wall) -->
  <rect x="42" y="500" width="16" height="100" fill="#f8fafc"/>
  <line x1="50" y1="500" x2="42" y2="500" stroke="#1e293b" stroke-width="4"/>
  <line x1="50" y1="600" x2="42" y2="600" stroke="#1e293b" stroke-width="4"/>
  
  <!-- Windows (top wall) -->
  <rect x="150" y="42" width="150" height="16" fill="#93c5fd" rx="2"/>
  <rect x="400" y="42" width="150" height="16" fill="#93c5fd" rx="2"/>
  <rect x="650" y="42" width="150" height="16" fill="#93c5fd" rx="2"/>
  <rect x="900" y="42" width="150" height="16" fill="#93c5fd" rx="2"/>
  
  <!-- Windows (right wall) -->
  <rect x="1142" y="200" width="16" height="150" fill="#93c5fd" rx="2"/>
  <rect x="1142" y="500" width="16" height="150" fill="#93c5fd" rx="2"/>
  
  <!-- Kitchen (top right corner) -->
  <rect x="900" y="70" width="220" height="200" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" rx="4"/>
  <text x="1010" y="165" text-anchor="middle" font-size="20" fill="#dc2626" font-weight="bold" font-family="sans-serif">BẾP</text>
  <text x="1010" y="190" text-anchor="middle" font-size="12" fill="#dc2626" font-family="sans-serif">Khu vực chế biến</text>
  
  <!-- Cashier (bottom right) -->
  <rect x="950" y="700" width="180" height="90" fill="#fefce8" stroke="#fbbf24" stroke-width="2" rx="4"/>
  <text x="1040" y="745" text-anchor="middle" font-size="14" fill="#a16207" font-weight="bold" font-family="sans-serif">QUẦY THU NGÂN</text>
  
  <!-- Toilet (left wall, middle) -->
  <rect x="70" y="350" width="130" height="150" fill="#f0fdf4" stroke="#86efac" stroke-width="2" rx="4"/>
  <text x="135" y="420" text-anchor="middle" font-size="16" fill="#16a34a" font-weight="bold" font-family="sans-serif">WC</text>
  <text x="135" y="445" text-anchor="middle" font-size="11" fill="#16a34a" font-family="sans-serif">Nam / Nữ</text>
  <path d="M 200 350 A 30 30 0 0 1 200 380" fill="none" stroke="#16a34a" stroke-width="2"/>
  
  <!-- Storage (top left) -->
  <rect x="70" y="70" width="180" height="120" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2" rx="4"/>
  <text x="160" y="130" text-anchor="middle" font-size="14" fill="#7c3aed" font-weight="bold" font-family="sans-serif">KHO</text>
  
  <!-- Zone dividers -->
  <line x1="500" y1="270" x2="500" y2="840" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <line x1="50" y1="550" x2="900" y2="550" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  
  <!-- Zone labels -->
  <text x="275" y="30" text-anchor="middle" font-size="14" fill="#64748b" font-family="sans-serif">KHU VỰC A — Sân vườn</text>
  <text x="700" y="30" text-anchor="middle" font-size="14" fill="#64748b" font-family="sans-serif">KHU VỰC B — Trong nhà</text>
</svg>
