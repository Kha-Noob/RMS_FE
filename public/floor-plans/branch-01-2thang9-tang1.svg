<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <!-- Background -->
  <rect width="1000" height="800" fill="#f8fafc" rx="8"/>
  
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1000" height="800" fill="url(#grid)"/>
  
  <!-- Outer Walls -->
  <rect x="50" y="50" width="900" height="700" fill="none" stroke="#1e293b" stroke-width="8" rx="4"/>
  
  <!-- Main Door (bottom center) -->
  <rect x="420" y="740" width="160" height="12" fill="#f8fafc"/>
  <line x1="420" y1="750" x2="420" y2="740" stroke="#1e293b" stroke-width="4"/>
  <line x1="580" y1="750" x2="580" y2="740" stroke="#1e293b" stroke-width="4"/>
  <text x="500" y="775" text-anchor="middle" font-size="14" fill="#64748b" font-family="sans-serif">CỬA CHÍNH</text>
  
  <!-- Windows (top wall) -->
  <rect x="150" y="42" width="120" height="16" fill="#93c5fd" rx="2"/>
  <rect x="350" y="42" width="120" height="16" fill="#93c5fd" rx="2"/>
  <rect x="550" y="42" width="120" height="16" fill="#93c5fd" rx="2"/>
  <rect x="750" y="42" width="120" height="16" fill="#93c5fd" rx="2"/>
  
  <!-- Kitchen Area (top right) -->
  <rect x="750" y="70" width="180" height="150" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" rx="4"/>
  <text x="840" y="145" text-anchor="middle" font-size="16" fill="#dc2626" font-weight="bold" font-family="sans-serif">BẾP</text>
  
  <!-- Cashier (bottom left) -->
  <rect x="70" y="600" width="160" height="90" fill="#fefce8" stroke="#fbbf24" stroke-width="2" rx="4"/>
  <text x="150" y="645" text-anchor="middle" font-size="14" fill="#a16207" font-weight="bold" font-family="sans-serif">QUẦY THU NGÂN</text>
  
  <!-- Toilet (left wall) -->
  <rect x="70" y="200" width="100" height="120" fill="#f0fdf4" stroke="#86efac" stroke-width="2" rx="4"/>
  <text x="120" y="255" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="bold" font-family="sans-serif">WC</text>
  <!-- Door arc for toilet -->
  <path d="M 170 200 A 30 30 0 0 1 170 230" fill="none" stroke="#16a34a" stroke-width="2"/>
  
  <!-- Divider wall (middle) -->
  <line x1="500" y1="220" x2="500" y2="740" stroke="#1e293b" stroke-width="4"/>
  <!-- Door opening in divider -->
  <rect x="488" y="400" width="24" height="80" fill="#f8fafc"/>
  <path d="M 488 400 A 40 40 0 0 1 512 400" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  
  <!-- Left zone label -->
  <text x="280" y="35" text-anchor="middle" font-size="13" fill="#64748b" font-family="sans-serif">KHU VỰC A</text>
  
  <!-- Right zone label -->
  <text x="700" y="35" text-anchor="middle" font-size="13" fill="#64748b" font-family="sans-serif">KHU VỰC B</text>
  
  <!-- Table placeholder positions (circles) -->
  <!-- These are just reference markers, actual tables are overlaid by POS -->
</svg>
